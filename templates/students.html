{% extends "layout.html" %}

{% block content %}

<div class="container">

    <h2 class="mb-3">Students Management</h2>

    <!-- ADD STUDENT CARD -->
    <div class="card p-3 shadow mb-3">
        <h5 class="mb-3">+ Add Student</h5>

        <form method="POST" action="/add_student">

            <div class="row">

                <div class="col-md-4">
                    <input name="name" class="form-control mb-2" placeholder="Student Name" required>
                </div>

                <div class="col-md-4">
                    <input name="course" class="form-control mb-2" placeholder="Course" required>
                </div>

                <div class="col-md-4">
                    <select name="status" class="form-control mb-2">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>

            </div>

            <button class="btn btn-success w-100">Add Student</button>

        </form>
    </div>


    <!-- SEARCH BOX -->
    <input type="text" id="searchBox" class="form-control mb-3"
        placeholder="Search Student Name...">


    <!-- STUDENTS TABLE -->
    <div class="card shadow p-3">

        <table class="table table-hover table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for s in students %}

                <tr>
                    <td>{{ s.id }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.course }}</td>

                    <td>
                        {% if s.status == "Active" %}
                        <span class="badge bg-success">Active</span>
                        {% else %}
                        <span class="badge bg-danger">Inactive</span>
                        {% endif %}
                    </td>

                    <td>
                        <a href="/view_student/{{ s.id }}" class="btn btn-info btn-sm">View</a>
                        <a href="/edit_student/{{ s.id }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete_student/{{ s.id }}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this student?')">
                            Delete
                        </a>
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>


<!-- SEARCH SCRIPT -->
<script>
document.getElementById("searchBox").addEventListener("keyup", function () {

    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("table tbody tr");

    rows.forEach(function (row) {

        let name = row.cells[1].innerText.toLowerCase();

        if (name.includes(value)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }

    });

});
</script>

{% endblock %}
