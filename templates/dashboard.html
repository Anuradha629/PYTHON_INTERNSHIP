{% block content %}


</div>
<div class="container mt-5">
    <div class="row">

        <div class="col-md-3 mb-4">
            <div class="card shadow border-0 rounded-4 text-center p-4 h-100">
                <div class="display-4">🎓</div>
                <h4 class="mt-3">Students</h4>
                <a href="/students" class="btn btn-primary btn-sm mt-2">View Students</a>
                <a href="/add_student" class="btn btn-success btn-sm mt-2">+ Add Student</a>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card shadow border-0 rounded-4 text-center p-4 h-100">
                <div class="display-4">👨‍🏫</div>
                <h4 class="mt-3">Teachers</h4>
                <a href="/teachers" class="btn btn-primary btn-sm mt-2">View Teachers</a>
                <a href="/add_teacher" class="btn btn-success btn-sm mt-2">+ Add Teacher</a>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card shadow border-0 rounded-4 text-center p-4 h-100">
                <div class="display-4">💰</div>
                <h4 class="mt-3">Fees</h4>
                <a href="/fees" class="btn btn-primary btn-sm mt-2">View Fees</a>
                <a href="/collect_fees" class="btn btn-warning btn-sm mt-2">Collect Fees</a>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card shadow border-0 rounded-4 text-center p-4 h-100">
                <div class="display-4">📅</div>
                <h4 class="mt-3">Attendance</h4>
                <a href="/attendance" class="btn btn-primary btn-sm mt-2">View Attendance</a>
                <a href="/mark_attendance" class="btn btn-danger btn-sm mt-2">Take Attendance</a>
            </div>
        </div>

    </div>
</div>
<div class="container mt-4">
    <div class="row justify-content-end">

        <div class="col-md-4">
            <div class="card shadow border-0 rounded-4 text-center">
                <div class="card-header bg-primary text-white">
                    <h5>Today's Date & Time</h5>
                </div>

                <div class="card-body">
                    <h3 id="clock"></h3>
                    <p id="date" class="text-muted"></p>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
function updateClock(){
const now = new Date();
document.getElementById("clock").innerHTML = now.toLocaleTimeString();
document.getElementById("date").innerHTML = now.toDateString();
}
setInterval(updateClock,1000);
updateClock();
</script>
